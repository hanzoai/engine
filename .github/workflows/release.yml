name: Release Hanzo Engine

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.6.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: hanzo-build-linux-amd64

    steps:
    - uses: actions/checkout@v4
      with:
        path: engine
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/ml
        path: ml
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/node
        path: node

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: engine

    - name: Build
      run: cargo build --manifest-path engine/Cargo.toml --package hanzo-engine --no-default-features --release --verbose

    - name: Run tests
      env:
        TESTS_HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: cargo test --manifest-path engine/Cargo.toml --package hanzo-engine --no-default-features --verbose

    - name: Check formatting
      run: cargo fmt --manifest-path engine/Cargo.toml --package hanzo-engine -- --check

    - name: Run clippy
      run: cargo clippy --manifest-path engine/Cargo.toml --package hanzo-engine --no-default-features -- -D warnings

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: hanzo-build-linux-amd64
            name: hanzoai-linux-amd64
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: hanzo-build-linux-amd64
            name: hanzoai-linux-arm64
            features: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: hanzoai-macos-amd64
            features: metal
          - target: aarch64-apple-darwin
            os: macos-14
            name: hanzoai-macos-arm64
            features: metal
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: hanzoai-windows-amd64.exe
            features: ""

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        path: engine
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/ml
        path: ml
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/node
        path: node

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        mkdir -p engine/.cargo
        echo '[target.aarch64-unknown-linux-gnu]' >> engine/.cargo/config.toml
        echo 'linker = "aarch64-linux-gnu-gcc"' >> engine/.cargo/config.toml

    - name: Build binary
      shell: bash
      run: |
        FEATURES="${{ matrix.features }}"
        if [ -n "$FEATURES" ]; then
          cargo build --manifest-path engine/Cargo.toml --package hanzo-engine --release --target ${{ matrix.target }} --features "$FEATURES"
        else
          cargo build --manifest-path engine/Cargo.toml --package hanzo-engine --release --target ${{ matrix.target }} --no-default-features
        fi

    - name: Rename binary to hanzoai
      shell: bash
      run: |
        cd engine/target/${{ matrix.target }}/release
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          mv hanzo-engine.exe hanzoai.exe
        else
          mv hanzo-engine hanzoai
        fi

    - name: Package binary
      shell: bash
      run: |
        cd engine/target/${{ matrix.target }}/release
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a ../../../../${{ matrix.name }}.zip hanzoai.exe
        else
          tar -czf ../../../../${{ matrix.name }}.tar.gz hanzoai
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: |
          *.tar.gz
          *.zip

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: hanzo-build-linux-amd64

    steps:
    - uses: actions/checkout@v4
      with:
        path: engine

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Generate changelog
      id: changelog
      run: |
        cd engine
        echo "## What's Changed" > CHANGELOG.md
        git log --pretty=format:"* %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## Features" >> CHANGELOG.md
        echo "- High-performance LLM inference engine" >> CHANGELOG.md
        echo "- Support for Qwen3 models (8B/4B variants)" >> CHANGELOG.md
        echo "- Native embeddings and reranking" >> CHANGELOG.md
        echo "- CUDA support for NVIDIA GPUs" >> CHANGELOG.md
        echo "- Metal support for Apple Silicon" >> CHANGELOG.md
        echo "- Flash Attention v3 support" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## Installation" >> CHANGELOG.md
        echo '```bash' >> CHANGELOG.md
        echo '# Download for your platform' >> CHANGELOG.md
        echo 'curl -L https://github.com/hanzoai/engine/releases/latest/download/hanzoai-$(uname -s | tr "[:upper:]" "[:lower:]")-$(uname -m).tar.gz | tar -xz' >> CHANGELOG.md
        echo 'sudo mv hanzo-engine /usr/local/bin/hanzoai' >> CHANGELOG.md
        echo '```' >> CHANGELOG.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/**/*
        body_path: engine/CHANGELOG.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: build-and-test
    runs-on: hanzo-build-linux-amd64

    steps:
    - uses: actions/checkout@v4
      with:
        path: engine
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/ml
        path: ml
    - uses: actions/checkout@v4
      with:
        repository: hanzoai/node
        path: node

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: engine/Dockerfile
        platforms: linux/amd64
        push: true
        tags: |
          hanzoai/engine:latest
          hanzoai/engine:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
